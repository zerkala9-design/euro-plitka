name: PhilipsRemote
options:
  bundleIdPrefix: com.europlitka.philipsremote
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"

packages: {}

targets:
  # ─────────────────────────────────────────────────────────────
  # Shared framework: models + services + design system
  # ─────────────────────────────────────────────────────────────
  PhilipsKit:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.europlitka.philipsremote.kit
        SKIP_INSTALL: YES

  # ─────────────────────────────────────────────────────────────
  # Main iOS application
  # ─────────────────────────────────────────────────────────────
  PhilipsRemote:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App/Sources
      - path: App/Resources
    dependencies:
      - target: PhilipsKit
      - target: PhilipsWidgets
      - target: PhilipsWatch
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleDisplayName: Philips Remote
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        NSLocalNetworkUsageDescription: "Philips Remote discovers and controls your Philips TV over your local Wi-Fi network."
        NSBonjourServices:
          - _philips-remote._tcp
          - _http._tcp
          - _airplay._tcp
        NSMicrophoneUsageDescription: "Voice control lets you speak commands and search your TV hands-free."
        NSSpeechRecognitionUsageDescription: "Speech recognition converts your voice into TV commands and searches."
        NSSupportsLiveActivities: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.europlitka.philipsremote
        CODE_SIGN_ENTITLEMENTS: Config/PhilipsRemote.entitlements

  # ─────────────────────────────────────────────────────────────
  # WidgetKit + Live Activity extension
  # ─────────────────────────────────────────────────────────────
  PhilipsWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Widget
    dependencies:
      - target: PhilipsKit
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Philips Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.europlitka.philipsremote.widgets
        CODE_SIGN_ENTITLEMENTS: Config/PhilipsWidgets.entitlements

  # ─────────────────────────────────────────────────────────────
  # Apple Watch companion app
  # ─────────────────────────────────────────────────────────────
  PhilipsWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: Watch/Sources
    info:
      path: Watch/Info.plist
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.europlitka.philipsremote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.europlitka.philipsremote.watchkitapp

  # ─────────────────────────────────────────────────────────────
  # Unit + integration tests (Swift Testing)
  # ─────────────────────────────────────────────────────────────
  PhilipsRemoteTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests
    dependencies:
      - target: PhilipsKit
      - target: PhilipsRemote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.europlitka.philipsremote.tests

schemes:
  PhilipsRemote:
    build:
      targets:
        PhilipsRemote: all
        PhilipsWidgets: all
        PhilipsWatch: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PhilipsRemoteTests
